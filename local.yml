services:
  postgres:
    build:
      context: .
      dockerfile: ./backend/docker/local/postgres/Dockerfile
    ports:
      - "5432:5432"

    volumes:
      - nextgen_local_db:/var/lib/postgresql/data

    enf_file:
      - ./.envs/.env/.env.local

    networks:
      - nextget_local_nw

networks:
  nextget_local_nw:
  external: true

volumes:
  nextgen_local_db:
